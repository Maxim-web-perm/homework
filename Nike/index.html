<!doctype html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- favicon -->
    <link
      rel="icon"
      href="./images/icons/nike-favicon-32x32.ico"
      type="image/x-icon"
    />
    <link rel="icon" href="./images/icons/favicon.svg" type="image/svg-xml" />
    <link rel="apple-touch-icon" href="./images/icons/apple-touch-icon.png" />

    <!-- JavaScript -->
    <script defer src="./js/index.js" type="module"></script>

    <!-- css -->
    <link rel="stylesheet" href="./css/index.css" />
    <title>Nike Air Mag</title>
  </head>

  <body class="page__body">
    <header class="header">
      <div class="container header__container">
        <a class="logo" href="#">
          <img
            class="logo__icon"
            src="./images/icons/logo-icon.svg"
            alt="логотип Nike"
          />
        </a>

        <nav
          class="menu header__menu"
          id="header__menu"
          aria-label="Главное меню"
        >
          <ul class="menu__list">
            <li class="menu__item">
              <a class="menu__link" href="#">Air Mag</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">Размеры</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">Характеристики</a>
            </li>
            <li class="menu__item">
              <a class="menu__link" href="#">Другие ТОП модели</a>
            </li>
          </ul>
        </nav>

        <div class="header__controls">
          <a class="header__order-button" href="">Сделать заказ</a>

          <div class="header__actions">
            <button
              class="header__actions-button"
              title="Поиск"
              aria-label="Поиск"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icons"
                  href="./images/icons/sprite.svg#search"
                ></use>
              </svg>
            </button>
            <button
              class="header__actions-button"
              title="Корзина"
              aria-label="Корзина"
            >
              <svg width="24" height="24">
                <use
                  class="header__actions-icons"
                  href="./images/icons/sprite.svg#cart"
                ></use>
              </svg>
            </button>

            <button
              class="burger header__burger-button"
              title="Открыть меню"
              aria-label="Открыть меню"
              aria-expanded="false"
              aria-controls="header__menu"
            >
              <svg width="24" height="24">
                <use
                  class="burger__icons-menu"
                  href="./images/icons/sprite.svg#burger"
                ></use>

                <use
                  class="burger__icons-cross"
                  href="./images/icons/sprite.svg#cross"
                ></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
